<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django's Legacy | RedM Roleplay</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --desert-sand: #d2b48c;
            --dusty-orange: #a0522d;
            --burnt-wood: #2b1d0e;
            --sunset-red: #8b0000;
            --paper: #f4e4bc;
            --gold: #ffd700;
        }

        /* --- Animaciones Base --- */
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
            50% { transform: translateY(-10px) scale(1.02); filter: drop-shadow(0 0 35px var(--dusty-orange)); }
        }

        body {
            background-color: var(--burnt-wood);
            background-image: url('https://www.transparenttextures.com/patterns/sandpaper.png');
            color: var(--paper);
            font-family: 'Special Elite', serif;
            margin: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            height: 60vh;
            background: linear-gradient(rgba(43, 29, 14, 0.4), rgba(43, 29, 14, 0.9)), 
                        url('https://images.unsplash.com/photo-1509316785289-025f5b846b35?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 8px solid var(--dusty-orange);
            text-align: center;
            padding: 20px;
        }

        .main-logo {
            width: 320px;
            max-width: 90%;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .container {
            max-width: 1200px;
            margin: -80px auto 100px;
            padding: 0 20px;
        }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        /* --- Tarjeta con Efectos --- */
        .job-card {
            background-color: #1e140a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            border: 2px solid var(--dusty-orange);
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            opacity: 0; /* Para la animación de entrada */
            animation: fadeInCard 0.8s forwards;
            position: relative;
            overflow: hidden;
        }

        .job-card:hover {
            transform: scale(1.03);
            border-color: var(--desert-sand);
            box-shadow: 0 0 30px rgba(160, 82, 45, 0.5);
            z-index: 2;
        }

        /* Efecto de brillo al pasar el ratón */
        .job-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(210, 180, 140, 0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
            pointer-events: none;
        }

        .job-card:hover::after {
            left: 100%;
            top: 100%;
        }

        .job-card h2 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--desert-sand);
            border-bottom: 1px solid var(--dusty-orange);
            padding-bottom: 10px;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .job-card h2 i {
            transition: transform 0.4s;
        }

        .job-card:hover h2 i {
            transform: rotate(15deg) scale(1.2);
            color: var(--gold);
        }

        .info-block strong {
            color: var(--dusty-orange);
            text-transform: uppercase;
            font-size: 0.8rem;
            display: block;
            letter-spacing: 1px;
        }

        /* --- Botones Animados --- */
        .details-btn {
            background: rgba(160, 82, 45, 0.1);
            border: 1px solid var(--dusty-orange);
            color: var(--paper);
            padding: 12px;
            cursor: pointer;
            font-family: 'Special Elite';
            width: 100%;
            margin: 15px 0;
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .details-btn:hover { 
            background: var(--dusty-orange);
            letter-spacing: 1px;
        }

        .extra-info {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0, 1, 0, 1);
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        .extra-info.show {
            max-height: 1000px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--dusty-orange);
            transition: all 0.5s ease-in;
        }

        .discord-btn {
            display: block;
            text-align: center;
            background: var(--dusty-orange);
            color: var(--paper);
            text-decoration: none;
            padding: 14px;
            margin-top: auto;
            font-weight: bold;
            border: 1px solid var(--desert-sand);
            transition: 0.3s;
            position: relative;
        }

        .discord-btn:hover {
            background: #be6335;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 60px;
            background: #000;
            color: var(--dusty-orange);
            border-top: 2px solid var(--dusty-orange);
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/ycPvMS55/Ativo-1.png" alt="Logo Django's Legacy" class="main-logo">
    <p class="animate__animated animate__fadeInUp" style="letter-spacing: 5px;">LEY Y DESIERTO</p>
</header>

<div class="container">
    <div class="job-grid" id="jobGrid"></div>
</div>

<footer>
    <p>&copy; 2026 Django's Legacy | RedM Roleplay Experience</p>
</footer>

<script>
    // Tu array de jobs permanece igual...
    const jobs = [
        { title: "Ranchos", icon: "fa-wheat-awn", fun: "Cosecha y cría animales para suministrar a tabernas.", loc: "McFarlands y ubicaciones exclusivas.", req: "Reclutamiento con el Jefe o vía Ticket.", details: "Te encargarás del ciclo completo de producción: desde alimentar al ganado y ordeñar, hasta procesar carnes y mantequilla.", link: "https://discord.gg/cgdSRG4B" },
        { title: "Tabaquero", icon: "fa-leaf", fun: "Producción artesanal de puros y cigarrillos.", loc: "Blackwater.", req: "Hablar con el dueño o vía Ticket.", details: "Un oficio de paciencia. Tus productos son esenciales para el rol social en los Saloons.", note: "⚠️ Nota: Trabajo de vocación enfocada 100% al rol.", link: "https://discord.gg/pmA5hpFH" },
        { title: "Veterinario", icon: "fa-briefcase-medical", fun: "Cuidado y cura de caballos.", loc: "Blackwater.", req: "Buscar al encargado.", details: "Tu presencia es vital: los caballos solo pueden ser curados de lesiones críticas si hay un veterinario.", note: "⚠️ Solo tú puedes reanimar caballos en estado crítico.", link: "https://discord.gg/pmA5hpFH" },
        { title: "Sheriff", icon: "fa-star", fun: "Control del orden público.", loc: "BlackWater.", req: "Entrevista y hablar con un agente.", details: "Patrullar el pueblo, intervenir en peleas y llevar a cabo investigaciones criminales.", link: "https://discord.gg/8BWyPmP2vX" },
        { title: "Cura", icon: "fa-cross", fun: "Guía espiritual y eventos.", loc: "Iglesias.", req: "Hablar con el encargado.", details: "Realizarás bodas, funerales y escucharás confesiones respetando el secreto.", link: "https://discord.gg/pmA5hpFH" },
        { title: "Cazarrecompensas", icon: "fa-skull", fun: "Captura de fugitivos.", loc: "Blackwater.", req: "Sin examen previo.", details: "Consulta los carteles de se busca y entrega a los delincuentes vivos o muertos.", link: "https://discord.gg/T5F3sQZn" }
        // ... (puedes añadir los demás aquí)
    ];

    const grid = document.getElementById('jobGrid');
    jobs.forEach((job, index) => {
        const card = document.createElement('div');
        card.className = 'job-card';
        // Añadimos un pequeño retraso en la animación de cada tarjeta para efecto cascada
        card.style.animationDelay = `${index * 0.1}s`;
        
        card.innerHTML = `
            <h2><i class="fas ${job.icon}"></i> ${job.title}</h2>
            <div class="info-block"><strong>📌 Función Principal</strong><p>${job.fun}</p></div>
            <div class="info-block"><strong>📍 Ubicación</strong><p>${job.loc}</p></div>
            
            <button class="details-btn" onclick="toggleDetails(${index})">
                <i class="fas fa-search-plus"></i> VER DINÁMICA
            </button>

            <div class="extra-info" id="info-${index}">
                <div class="info-block"><strong>📋 Acceso</strong><p>${job.req}</p></div>
                <div class="info-block"><strong>📖 ¿Cómo es el trabajo?</strong><p>${job.details}</p></div>
                ${job.note ? `<div class="special-note">${job.note}</div>` : ''}
            </div>

            <a href="${job.link}" class="discord-btn" target="_blank"><i class="fab fa-discord"></i> UNIRSE</a>
        `;
        grid.appendChild(card);
    });

    function toggleDetails(id) {
        const el = document.getElementById(`info-${id}`);
        const isShowing = el.classList.contains('show');
        
        // Cerrar otros si quieres (opcional)
        // document.querySelectorAll('.extra-info').forEach(e => e.classList.remove('show'));

        el.classList.toggle('show');
        const btn = el.previousElementSibling;
        const icon = btn.querySelector('i');
        
        if(!isShowing) {
            icon.className = 'fas fa-minus-circle animate__animated animate__rotateIn';
        } else {
            icon.className = 'fas fa-search-plus animate__animated animate__rotateIn';
        }
    }
</script>

</body>
</html>
